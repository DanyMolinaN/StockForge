<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario - Registro de Productos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="panel form-panel">
      <div class="brand">
        <p class="eyebrow">StockForge</p>
        <h1 id="form-title">Registro de Nuevo Producto</h1>
        <p class="subtext">Llene los campos requeridos.</p>
      </div>

      <form id="product-form" class="product-form" novalidate>
        <input type="hidden" id="product-id" />

        <div class="form-group">
          <label for="name">Nombre del producto</label>
          <input type="text" id="name" name="name" placeholder="Ej. Camiseta deportiva" autocomplete="off" />
          <p class="field-error" id="error-name"></p>
        </div>

        <div class="form-group">
          <label for="sku">Código o SKU</label>
          <input type="text" id="sku" name="sku" placeholder="Ej. PROD-001" autocomplete="off" />
          <p class="field-error" id="error-sku"></p>
        </div>

        <div class="form-group split">
          <div>
            <label for="price">Precio</label>
            <input type="number" id="price" name="price" placeholder="0.00" step="0.01" min="0" />
            <p class="field-error" id="error-price"></p>
          </div>

          <div>
            <label for="stock">Stock inicial</label>
            <input type="number" id="stock" name="stock" placeholder="0" min="0" />
            <p class="field-error" id="error-stock"></p>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Guardar producto</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">Cancelar</button>
          <p class="submission-message" id="submission-message"></p>
        </div>
      </form>
    </section>

    <section class="panel catalog-panel">
      <div class="catalog-header">
        <h2>Catálogo de Productos</h2>
        <p>Los productos registrados se muestran inmediatamente en esta vista.</p>
      </div>

      <div class="catalog-table-wrapper">
        <table class="catalog-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>SKU</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="product-list">
            <tr>
              <td colspan="5" class="empty-state">No hay productos registrados.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
